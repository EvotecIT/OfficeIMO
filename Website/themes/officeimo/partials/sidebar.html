<aside class="imo-docs-sidebar" role="navigation" aria-label="Documentation sidebar">
  <button class="imo-sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <nav class="imo-sidebar-nav">
    {{ for group in navigation.sidebar }}
    <div class="imo-sidebar-group">
      <h4 class="imo-sidebar-group-title">{{ group.title }}</h4>
      <ul class="imo-sidebar-list">
        {{ for item in group.items }}
        <li>
          <a href="{{ item.url }}" class="imo-sidebar-link{{ if page.url == item.url }} active{{ end }}">
            {{ item.title }}
          </a>
          {{ if item.items }}
          <ul class="imo-sidebar-sublist">
            {{ for sub in item.items }}
            <li>
              <a href="{{ sub.url }}" class="imo-sidebar-link{{ if page.url == sub.url }} active{{ end }}">
                {{ sub.title }}
              </a>
            </li>
            {{ end }}
          </ul>
          {{ end }}
        </li>
        {{ end }}
      </ul>
    </div>
    {{ end }}
  </nav>
</aside>
