<section class="imo-cta-section">
  <div class="imo-container imo-cta-section__inner">
    <h2 class="imo-cta-section__title">Start Building Office Documents Today</h2>
    <p class="imo-cta-section__desc">Free, open source, and MIT licensed. Install in seconds.</p>
    <div class="imo-cta-section__actions">
      <div class="imo-install">
        <span class="imo-install__label">.NET</span>
        <code class="imo-install__code">dotnet add package OfficeIMO.Word</code>
        <button class="imo-install__copy" type="button" data-copy="dotnet add package OfficeIMO.Word" aria-label="Copy">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
      <div class="imo-install">
        <span class="imo-install__label">PowerShell</span>
        <code class="imo-install__code">Install-Module PSWriteOffice</code>
        <button class="imo-install__copy" type="button" data-copy="Install-Module PSWriteOffice" aria-label="Copy">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
    </div>
    <a href="/docs/getting-started/" class="imo-btn imo-btn-primary">Get Started</a>
  </div>
</section>
