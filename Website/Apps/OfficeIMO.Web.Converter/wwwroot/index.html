<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfficeIMO Browser Conversion Playground</title>
    <meta name="description" content="Convert DOCX, XLSX, and PPTX files to PDF locally in the browser with OfficeIMO WebAssembly." />
    <base href="/apps/officeimo-converter/" />
    <link rel="canonical" href="https://officeimo.com/apps/officeimo-converter/" />
    <link rel="alternate" hreflang="en" href="https://officeimo.com/apps/officeimo-converter/" />
    <link rel="alternate" hreflang="x-default" href="https://officeimo.com/apps/officeimo-converter/" />
    <link rel="preload" id="webassembly" />
    <script>(function(){function a(){var t=localStorage.getItem('imo-theme');if(t!=='light'&&t!=='dark'){t='light';}document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;}a();if(new URLSearchParams(location.search).get('embedded')==='1'){document.documentElement.classList.add('ocx-embedded');}addEventListener('storage',function(e){if(e.key==='imo-theme'){a();}});})();</script>
    <link rel="stylesheet" href="converter.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="importmap"></script>
</head>

<body class="imo-body officeimo-converter-standalone">
    <div id="app">
        <main class="ocx-shell">
            <div class="ocx-container">
                <h1 class="ocx-loading">Loading OfficeIMO converter...</h1>
            </div>
        </main>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
