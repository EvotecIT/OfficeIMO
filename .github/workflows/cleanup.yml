name: Actions Storage Cleanup

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Delete items older than N days'
        required: false
        default: '7'
      keep_artifacts:
        description: 'Keep newest N artifacts'
        required: false
        default: '20'
      keep_caches:
        description: 'Keep newest N caches'
        required: false
        default: '20'

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-storage-cleanup
  cancel-in-progress: false

env:
  CLEAN_DAYS: ${{ github.event.inputs.days || '7' }}
  KEEP_ARTIFACTS: ${{ github.event.inputs.keep_artifacts || '20' }}
  KEEP_CACHES: ${{ github.event.inputs.keep_caches || '20' }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Show settings
        run: |
          echo "Days threshold: $CLEAN_DAYS"
          echo "Keep newest artifacts: $KEEP_ARTIFACTS"
          echo "Keep newest caches:   $KEEP_CACHES"

      - name: Run PowerForge housekeeping
        uses: EvotecIT/PSPublishModule/.github/actions/github-housekeeping@f4c27127753cc1740b62d4473da8767d6e8c8d3e
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cleanup-runner: 'false'
          artifact-max-age-days: ${{ env.CLEAN_DAYS }}
          artifact-keep: ${{ env.KEEP_ARTIFACTS }}
          cache-max-age-days: ${{ env.CLEAN_DAYS }}
          cache-keep: ${{ env.KEEP_CACHES }}
