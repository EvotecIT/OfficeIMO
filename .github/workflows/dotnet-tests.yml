name: Test .NET Libraries

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'Docs/**'
      - 'Examples/**'
      - 'Website/**'
      - '.github/workflows/website-ci.yml'
      - '.github/workflows/deploy-website.yml'
      - '.gitignore'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'Docs/**'
      - 'Examples/**'
      - 'Website/**'
      - '.github/workflows/website-ci.yml'
      - '.github/workflows/deploy-website.yml'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: |
    8.0.418
    10.0.103
  BUILD_CONFIGURATION: 'Release'
  TEST_VERBOSITY: minimal # set to 'detailed' to restore full test output
  SUMMARIZE_FAILURES: true # set to 'false' to disable summarizing failing tests

jobs:
  build-matrix:
    name: 'Cross-platform build'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore OfficeIMO.sln

      - name: Build solution
        run: dotnet build OfficeIMO.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

  email-package-consumers:
    name: 'OfficeIMO email platform packed consumers'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack and test clean package consumers
        shell: pwsh
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/officeimo-email-package-cache
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $feed = Join-Path $env:RUNNER_TEMP 'officeimo-email-feed'
          $configDirectory = Join-Path $env:RUNNER_TEMP 'officeimo-email-nuget'
          $configPath = Join-Path $configDirectory 'nuget.config'
          New-Item -ItemType Directory -Force -Path $feed | Out-Null
          dotnet restore OfficeIMO.Email.Store/OfficeIMO.Email.Store.csproj --no-http-cache
          dotnet restore OfficeIMO.Reader.EmailStore/OfficeIMO.Reader.EmailStore.csproj --no-http-cache
          dotnet restore OfficeIMO.Reader.EmailAddressBook/OfficeIMO.Reader.EmailAddressBook.csproj --no-http-cache
          dotnet pack OfficeIMO.Drawing/OfficeIMO.Drawing.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Rtf/OfficeIMO.Rtf.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Email/OfficeIMO.Email.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Email.AddressBook/OfficeIMO.Email.AddressBook.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Email.Store/OfficeIMO.Email.Store.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Reader/OfficeIMO.Reader.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Reader.EmailAddressBook/OfficeIMO.Reader.EmailAddressBook.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          dotnet pack OfficeIMO.Reader.EmailStore/OfficeIMO.Reader.EmailStore.csproj --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          function Get-PackedPackageVersion([string] $id) {
            $escapedId = [regex]::Escape($id)
            $packages = @(Get-ChildItem -LiteralPath $feed -Filter "$id.*.nupkg" |
              Where-Object { $_.BaseName -match "^$escapedId\.\d" })
            if ($packages.Count -ne 1) {
              throw "Expected exactly one packed $id package, found $($packages.Count)."
            }
            return $packages[0].BaseName.Substring($id.Length + 1)
          }
          $emailVersion = Get-PackedPackageVersion 'OfficeIMO.Email'
          $emailAddressBookVersion = Get-PackedPackageVersion 'OfficeIMO.Email.AddressBook'
          $emailStoreVersion = Get-PackedPackageVersion 'OfficeIMO.Email.Store'
          $readerVersion = Get-PackedPackageVersion 'OfficeIMO.Reader'
          $readerEmailAddressBookVersion = Get-PackedPackageVersion 'OfficeIMO.Reader.EmailAddressBook'
          $readerEmailStoreVersion = Get-PackedPackageVersion 'OfficeIMO.Reader.EmailStore'
          $drawingVersion = Get-PackedPackageVersion 'OfficeIMO.Drawing'
          $rtfVersion = Get-PackedPackageVersion 'OfficeIMO.Rtf'
          $smokeProperties = @(
            '--property:EnableOfficeIMOEmailPackageSmoke=true',
            "--property:OfficeIMOEmailPackageVersion=$emailVersion",
            "--property:OfficeIMOEmailAddressBookPackageVersion=$emailAddressBookVersion",
            "--property:OfficeIMOEmailStorePackageVersion=$emailStoreVersion",
            "--property:OfficeIMOReaderPackageVersion=$readerVersion",
            "--property:OfficeIMOReaderEmailAddressBookPackageVersion=$readerEmailAddressBookVersion",
            "--property:OfficeIMOReaderEmailStorePackageVersion=$readerEmailStoreVersion"
          )
          dotnet new nugetconfig --output $configDirectory --force
          dotnet nuget add source "$feed" --name OfficeIMOLocal --configfile "$configPath"
          dotnet restore Build/PackageSmoke/OfficeIMO.Email/OfficeIMO.Email.PackageSmoke.csproj @smokeProperties --configfile "$configPath" --no-http-cache
          $expectedFeed = (Resolve-Path $feed).Path.TrimEnd('\', '/')
          foreach ($package in @(
            @{ Id = 'officeimo.email'; Version = $emailVersion },
            @{ Id = 'officeimo.email.addressbook'; Version = $emailAddressBookVersion },
            @{ Id = 'officeimo.email.store'; Version = $emailStoreVersion },
            @{ Id = 'officeimo.reader'; Version = $readerVersion },
            @{ Id = 'officeimo.reader.emailaddressbook'; Version = $readerEmailAddressBookVersion },
            @{ Id = 'officeimo.reader.emailstore'; Version = $readerEmailStoreVersion },
            @{ Id = 'officeimo.drawing'; Version = $drawingVersion },
            @{ Id = 'officeimo.rtf'; Version = $rtfVersion }
          )) {
            $metadataPath = Join-Path $env:NUGET_PACKAGES "$($package.Id)/$($package.Version)/.nupkg.metadata"
            $metadata = Get-Content $metadataPath -Raw | ConvertFrom-Json
            $resolvedSource = (Resolve-Path $metadata.source).Path.TrimEnd('\', '/')
            if (-not $resolvedSource.Equals($expectedFeed, [StringComparison]::OrdinalIgnoreCase)) {
              throw "$($package.Id) restored from '$resolvedSource' instead of the local package feed '$expectedFeed'."
            }
          }
          dotnet run --project Build/PackageSmoke/OfficeIMO.Email/OfficeIMO.Email.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net472 --no-restore @smokeProperties
          dotnet run --project Build/PackageSmoke/OfficeIMO.Email/OfficeIMO.Email.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net8.0 --no-restore @smokeProperties
          dotnet run --project Build/PackageSmoke/OfficeIMO.Email/OfficeIMO.Email.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net10.0 --no-restore @smokeProperties

  onenote-package-consumers:
    name: 'OfficeIMO.OneNote packed consumers'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack and test clean package consumers
        shell: pwsh
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/officeimo-onenote-package-cache
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $feed = Join-Path $env:RUNNER_TEMP 'officeimo-onenote-feed'
          $configDirectory = Join-Path $env:RUNNER_TEMP 'officeimo-onenote-nuget'
          $configPath = Join-Path $configDirectory 'nuget.config'
          New-Item -ItemType Directory -Force -Path $feed | Out-Null
          $projects = @(
            'OfficeIMO.Drawing/OfficeIMO.Drawing.csproj',
            'OfficeIMO.Reader/OfficeIMO.Reader.csproj',
            'OfficeIMO.OneNote/OfficeIMO.OneNote.csproj',
            'OfficeIMO.OneNote.Markdown/OfficeIMO.OneNote.Markdown.csproj',
            'OfficeIMO.OneNote.Html/OfficeIMO.OneNote.Html.csproj',
            'OfficeIMO.Pdf/OfficeIMO.Pdf.csproj',
            'OfficeIMO.Markdown.Pdf/OfficeIMO.Markdown.Pdf.csproj',
            'OfficeIMO.OneNote.Pdf/OfficeIMO.OneNote.Pdf.csproj',
            'OfficeIMO.Reader.OneNote/OfficeIMO.Reader.OneNote.csproj'
          )
          foreach ($project in $projects) {
            dotnet restore $project --no-http-cache
            dotnet pack $project --configuration $env:BUILD_CONFIGURATION --no-restore --output $feed
          }
          function Get-PackedPackageVersion([string] $id) {
            $escapedId = [Regex]::Escape($id)
            $packages = @(Get-ChildItem -LiteralPath $feed -Filter "$id.*.nupkg" |
              Where-Object { $_.BaseName -match "^$escapedId\.[0-9]" })
            if ($packages.Count -ne 1) {
              throw "Expected exactly one packed $id package, found $($packages.Count)."
            }
            return $packages[0].BaseName.Substring($id.Length + 1)
          }
          $packageIds = @(
            'OfficeIMO.Drawing',
            'OfficeIMO.Reader',
            'OfficeIMO.OneNote',
            'OfficeIMO.OneNote.Markdown',
            'OfficeIMO.OneNote.Html',
            'OfficeIMO.Pdf',
            'OfficeIMO.Markdown.Pdf',
            'OfficeIMO.OneNote.Pdf',
            'OfficeIMO.Reader.OneNote'
          )
          $packageVersions = @{}
          foreach ($packageId in $packageIds) {
            $packageVersions[$packageId] = Get-PackedPackageVersion $packageId
          }
          $oneNoteVersion = $packageVersions['OfficeIMO.OneNote']
          foreach ($packageId in $packageIds) {
            if ($packageVersions[$packageId] -ne $oneNoteVersion) {
              throw "$packageId packed as $($packageVersions[$packageId]); expected $oneNoteVersion."
            }
          }
          $smokeProperties = @(
            '--property:EnableOfficeIMOOneNotePackageSmoke=true',
            "--property:OfficeIMOOneNotePackageVersion=$oneNoteVersion"
          )
          dotnet new nugetconfig --output $configDirectory --force
          dotnet nuget add source "$feed" --name OfficeIMOLocal --configfile "$configPath"
          [xml] $nugetConfig = Get-Content -LiteralPath $configPath
          $sourceMapping = $nugetConfig.CreateElement('packageSourceMapping')
          $nugetOrgSource = @($nugetConfig.configuration.packageSources.add |
            Where-Object { $_.value -eq 'https://api.nuget.org/v3/index.json' })
          if ($nugetOrgSource.Count -ne 1) {
            throw "Expected exactly one nuget.org source in $configPath."
          }
          $nugetOrgMapping = $nugetConfig.CreateElement('packageSource')
          $nugetOrgMapping.SetAttribute('key', $nugetOrgSource[0].key)
          $publicPattern = $nugetConfig.CreateElement('package')
          $publicPattern.SetAttribute('pattern', '*')
          [void] $nugetOrgMapping.AppendChild($publicPattern)
          [void] $sourceMapping.AppendChild($nugetOrgMapping)
          $localMapping = $nugetConfig.CreateElement('packageSource')
          $localMapping.SetAttribute('key', 'OfficeIMOLocal')
          foreach ($packageId in $packageIds) {
            $localPattern = $nugetConfig.CreateElement('package')
            $localPattern.SetAttribute('pattern', $packageId)
            [void] $localMapping.AppendChild($localPattern)
          }
          [void] $sourceMapping.AppendChild($localMapping)
          [void] $nugetConfig.configuration.AppendChild($sourceMapping)
          $nugetConfig.Save($configPath)
          dotnet restore Build/PackageSmoke/OfficeIMO.OneNote/OfficeIMO.OneNote.PackageSmoke.csproj @smokeProperties --configfile "$configPath" --no-http-cache
          $expectedFeed = (Resolve-Path $feed).Path.TrimEnd('\', '/')
          foreach ($packageId in $packageIds) {
            $packageVersion = $packageVersions[$packageId]
            $metadataPath = Join-Path $env:NUGET_PACKAGES "$($packageId.ToLowerInvariant())/$packageVersion/.nupkg.metadata"
            $metadata = Get-Content $metadataPath -Raw | ConvertFrom-Json
            $resolvedSource = (Resolve-Path $metadata.source).Path.TrimEnd('\', '/')
            if (-not $resolvedSource.Equals($expectedFeed, [StringComparison]::OrdinalIgnoreCase)) {
              throw "$packageId restored from '$resolvedSource' instead of the local package feed '$expectedFeed'."
            }
          }
          dotnet run --project Build/PackageSmoke/OfficeIMO.OneNote/OfficeIMO.OneNote.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net472 --no-restore @smokeProperties
          dotnet run --project Build/PackageSmoke/OfficeIMO.OneNote/OfficeIMO.OneNote.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net8.0 --no-restore @smokeProperties
          dotnet run --project Build/PackageSmoke/OfficeIMO.OneNote/OfficeIMO.OneNote.PackageSmoke.csproj --configuration $env:BUILD_CONFIGURATION --framework net10.0 --no-restore @smokeProperties

  opendocument-schema:
    name: 'OpenDocument schema and LibreOffice'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install schema and OpenDocument interoperability tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libxml2-utils unzip libreoffice-core libreoffice-writer libreoffice-calc libreoffice-impress

      - name: Build OpenDocument schema probe
        run: |
          dotnet restore OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj
          dotnet build OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore

      - name: Emit representative ODF packages
        env:
          OFFICEIMO_ODF_SCHEMA_OUTPUT: ${{ runner.temp }}/officeimo-odf-artifacts
        run: dotnet test OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-build --filter Category=OpenDocumentSchemaArtifact

      - name: Validate pinned OASIS schemas
        run: bash Build/validate-opendocument-schema.sh "${{ runner.temp }}/officeimo-odf-artifacts" "${{ runner.temp }}/officeimo-odf-schema"

      - name: Report LibreOffice test-oracle version
        run: soffice --version

      - name: Open and resave generated packages with LibreOffice
        run: bash Build/validate-opendocument-libreoffice.sh "${{ runner.temp }}/officeimo-odf-artifacts" "${{ runner.temp }}/officeimo-odf-libreoffice"

      - name: Reopen LibreOffice outputs and verify semantics
        env:
          OFFICEIMO_ODF_INTEROP_INPUT: ${{ runner.temp }}/officeimo-odf-libreoffice
        run: dotnet test OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-build --filter Category=OpenDocumentLibreOfficeArtifact

  binary-powerpoint-libreoffice:
    name: 'Binary PowerPoint and LibreOffice'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install LibreOffice Impress
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libreoffice-core libreoffice-impress

      - name: Build binary PowerPoint interoperability probe
        run: |
          dotnet restore OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj
          dotnet build OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore

      - name: Emit representative PPT, POT, and PPS files
        env:
          OFFICEIMO_LEGACY_PPT_INTEROP_OUTPUT: ${{ runner.temp }}/officeimo-binary-powerpoint
        run: dotnet test OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-build --filter Category=LegacyPptLibreOfficeArtifact

      - name: Report LibreOffice test-oracle version
        run: soffice --version

      - name: Open, render, and resave generated files with LibreOffice
        run: bash Build/validate-powerpoint-binary-libreoffice.sh "${{ runner.temp }}/officeimo-binary-powerpoint" "${{ runner.temp }}/officeimo-binary-powerpoint-libreoffice"

      - name: Reopen LibreOffice outputs and verify semantics
        env:
          OFFICEIMO_LEGACY_PPT_INTEROP_INPUT: ${{ runner.temp }}/officeimo-binary-powerpoint-libreoffice/roundtrip
        run: dotnet test OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-build --filter Category=LegacyPptLibreOfficeReopen

  test-windows:
    name: '.NET Framework 4.7.2 / ${{ matrix.name }}'
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - name: AsciiDoc
            project: OfficeIMO.AsciiDoc.Tests/OfficeIMO.AsciiDoc.Tests.csproj
          - name: AsciiDoc-Markdown
            project: OfficeIMO.AsciiDoc.Markdown.Tests/OfficeIMO.AsciiDoc.Markdown.Tests.csproj
          - name: CSV
            project: OfficeIMO.CSV.Tests/OfficeIMO.CSV.Tests.csproj
          - name: Drawing
            project: OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj
          - name: Drawing-CodeGlyphX
            project: OfficeIMO.Drawing.CodeGlyphX.Tests/OfficeIMO.Drawing.CodeGlyphX.Tests.csproj
          - name: Email
            project: OfficeIMO.Email.Tests/OfficeIMO.Email.Tests.csproj
          - name: Excel
            project: OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj
          - name: GoogleWorkspace
            project: OfficeIMO.GoogleWorkspace.Tests/OfficeIMO.GoogleWorkspace.Tests.csproj
          - name: Html
            project: OfficeIMO.Html.Tests/OfficeIMO.Html.Tests.csproj
          - name: Latex
            project: OfficeIMO.Latex.Tests/OfficeIMO.Latex.Tests.csproj
          - name: Latex-Markdown
            project: OfficeIMO.Latex.Markdown.Tests/OfficeIMO.Latex.Markdown.Tests.csproj
          - name: Markdown
            project: OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj
          - name: Markup
            project: OfficeIMO.Markup.Tests/OfficeIMO.Markup.Tests.csproj
          - name: OpenDocument
            project: OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj
          - name: OpenDocument-Converters
            project: OfficeIMO.OpenDocument.Converters.Tests/OfficeIMO.OpenDocument.Converters.Tests.csproj
          - name: OneNote
            project: OfficeIMO.OneNote.Tests/OfficeIMO.OneNote.Tests.csproj
          - name: Pdf
            project: OfficeIMO.Pdf.Tests/OfficeIMO.Pdf.Tests.csproj
          - name: PowerPoint
            project: OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj
          - name: Reader
            project: OfficeIMO.Reader.Tests/OfficeIMO.Reader.Tests.csproj
          - name: Rtf
            project: OfficeIMO.Rtf.Tests/OfficeIMO.Rtf.Tests.csproj
          - name: Shared
            project: OfficeIMO.Shared.Tests/OfficeIMO.Shared.Tests.csproj
          - name: Visio
            project: OfficeIMO.Visio.Tests/OfficeIMO.Visio.Tests.csproj
          - name: Word
            project: OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.project }}

      - name: Run net472 contract tests
        # Exact image pixels are a dedicated modern-runtime visual-gate contract, not a cross-TFM invariant.
        run: dotnet test ${{ matrix.project }} --configuration ${{ env.BUILD_CONFIGURATION }} --framework net472 --no-restore --verbosity ${{ env.TEST_VERBOSITY }} --filter "Category!=ExcelImageVisualGate" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx

      - name: Pack optional CodeGlyphX drawing bridge
        if: ${{ matrix.name == 'Drawing-CodeGlyphX' }}
        run: dotnet pack OfficeIMO.Drawing.CodeGlyphX/OfficeIMO.Drawing.CodeGlyphX.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --output artifacts/codeglyphx-drawing-package

      - name: Summarize failing tests
        if: failure() && env.SUMMARIZE_FAILURES == 'true'
        shell: pwsh
        run: |
          $trxFiles = Get-ChildItem -Recurse -Filter *.trx
          if ($trxFiles.Count -eq 0) {
            Write-Host "No TRX files found for failure analysis"
            exit 0
          }

          Write-Host "=== Failed Tests Summary ==="
          $failureCount = 0

          foreach ($file in $trxFiles) {
            try {
              Select-Xml -Path $file.FullName -XPath "//UnitTestResult[@outcome='Failed']" |
                ForEach-Object {
                  $name = $_.Node.testName
                  $msg = $_.Node.Output.ErrorInfo.Message ?? "No error message available"
                  Write-Host "❌ $name"
                  Write-Host "   $msg"
                  $failureCount++
                }
            } catch {
              Write-Host "Warning: Could not parse TRX file $($file.Name): $($_.Exception.Message)"
            }
          }

          if ($failureCount -eq 0) {
            Write-Host "No failed tests found in TRX files"
          } else {
            Write-Host "=== Total failed tests: $failureCount ==="
          }

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-net472-${{ matrix.name }}
          path: '**/*.trx'

  test-ubuntu-matrix:
    name: 'Ubuntu ${{ matrix.framework }} / ${{ matrix.partition }}'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - framework: net8.0
            partition: markdown-large
            collectCoverage: false
          - framework: net10.0
            partition: markdown-large
            collectCoverage: false
          - framework: net8.0
            partition: markdown-suite
            collectCoverage: false
          - framework: net10.0
            partition: markdown-suite
            collectCoverage: false
          - framework: net8.0
            partition: pdf-visual-inspector
            collectCoverage: false
          - framework: net10.0
            partition: pdf-visual-inspector
            collectCoverage: false
          - framework: net8.0
            partition: pdf-core
            collectCoverage: false
          - framework: net10.0
            partition: pdf-core
            collectCoverage: false
          - framework: net8.0
            partition: excel-image-charts
            collectCoverage: false
          - framework: net10.0
            partition: excel-image-charts
            collectCoverage: false
          - framework: net8.0
            partition: excel-legacy-reader
            collectCoverage: false
          - framework: net10.0
            partition: excel-legacy-reader
            collectCoverage: false
          - framework: net8.0
            partition: excel-core-named
            collectCoverage: false
          - framework: net10.0
            partition: excel-core-named
            collectCoverage: false
          - framework: net8.0
            partition: word-rtf-html
            collectCoverage: false
          - framework: net10.0
            partition: word-rtf-html
            collectCoverage: false
          - framework: net8.0
            partition: other-projects
            collectCoverage: false
          - framework: net10.0
            partition: other-projects
            collectCoverage: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore test dependencies
        run: |
          if [ "${{ matrix.partition }}" = "other-projects" ]; then
            dotnet restore OfficeIMO.Shared.Tests/OfficeIMO.Shared.Tests.csproj
          fi
          if [[ "${{ matrix.partition }}" == markdown-* ]]; then
            dotnet restore OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj
          fi
          if [[ "${{ matrix.partition }}" == excel-* ]]; then
            dotnet restore OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj
          fi
          if [[ "${{ matrix.partition }}" == "word-rtf-html" || "${{ matrix.partition }}" == "markdown-large" ]]; then
            dotnet restore OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj
          fi
          if [ "${{ matrix.partition }}" = "word-rtf-html" ]; then
            dotnet restore OfficeIMO.Rtf.Tests/OfficeIMO.Rtf.Tests.csproj
            dotnet restore OfficeIMO.Html.Tests/OfficeIMO.Html.Tests.csproj
          fi
          if [[ "${{ matrix.partition }}" == pdf-* ]]; then
            dotnet restore OfficeIMO.Pdf.Tests/OfficeIMO.Pdf.Tests.csproj
          fi
          if [ "${{ matrix.partition }}" = "other-projects" ]; then
            dotnet restore OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj
            dotnet restore OfficeIMO.Drawing.CodeGlyphX.Tests/OfficeIMO.Drawing.CodeGlyphX.Tests.csproj
            dotnet restore OfficeIMO.GoogleWorkspace.Tests/OfficeIMO.GoogleWorkspace.Tests.csproj
            dotnet restore OfficeIMO.Markup.Tests/OfficeIMO.Markup.Tests.csproj
            dotnet restore OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj
            dotnet restore OfficeIMO.Visio.Tests/OfficeIMO.Visio.Tests.csproj
            dotnet restore OfficeIMO.Reader.Tests/OfficeIMO.Reader.Tests.csproj
            dotnet restore OfficeIMO.OneNote.Tests/OfficeIMO.OneNote.Tests.csproj
            dotnet restore OfficeIMO.CSV.Tests/OfficeIMO.CSV.Tests.csproj
            dotnet restore OfficeIMO.VerifyTests/OfficeIMO.VerifyTests.csproj
            dotnet restore OfficeIMO.MarkdownRenderer.Wpf.Tests/OfficeIMO.MarkdownRenderer.Wpf.Tests.csproj
            dotnet restore OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj
            dotnet restore OfficeIMO.OpenDocument.Converters.Tests/OfficeIMO.OpenDocument.Converters.Tests.csproj
            dotnet restore OfficeIMO.AsciiDoc.Tests/OfficeIMO.AsciiDoc.Tests.csproj
            dotnet restore OfficeIMO.AsciiDoc.Markdown.Tests/OfficeIMO.AsciiDoc.Markdown.Tests.csproj
            dotnet restore OfficeIMO.Latex.Tests/OfficeIMO.Latex.Tests.csproj
            dotnet restore OfficeIMO.Latex.Markdown.Tests/OfficeIMO.Latex.Markdown.Tests.csproj
          fi

      - name: Build test projects
        run: |
          if [ "${{ matrix.partition }}" = "other-projects" ]; then
            dotnet build OfficeIMO.Shared.Tests/OfficeIMO.Shared.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [[ "${{ matrix.partition }}" == markdown-* ]]; then
            dotnet build OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [[ "${{ matrix.partition }}" == excel-* ]]; then
            dotnet build OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [[ "${{ matrix.partition }}" == "word-rtf-html" || "${{ matrix.partition }}" == "markdown-large" ]]; then
            dotnet build OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [ "${{ matrix.partition }}" = "word-rtf-html" ]; then
            dotnet build OfficeIMO.Rtf.Tests/OfficeIMO.Rtf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Html.Tests/OfficeIMO.Html.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [[ "${{ matrix.partition }}" == pdf-* ]]; then
            dotnet build OfficeIMO.Pdf.Tests/OfficeIMO.Pdf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi
          if [ "${{ matrix.partition }}" = "other-projects" ]; then
            dotnet build OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Drawing.CodeGlyphX.Tests/OfficeIMO.Drawing.CodeGlyphX.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.GoogleWorkspace.Tests/OfficeIMO.GoogleWorkspace.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Markup.Tests/OfficeIMO.Markup.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Visio.Tests/OfficeIMO.Visio.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Reader.Tests/OfficeIMO.Reader.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.OneNote.Tests/OfficeIMO.OneNote.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.CSV.Tests/OfficeIMO.CSV.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.VerifyTests/OfficeIMO.VerifyTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.MarkdownRenderer.Wpf.Tests/OfficeIMO.MarkdownRenderer.Wpf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.OpenDocument.Converters.Tests/OfficeIMO.OpenDocument.Converters.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.AsciiDoc.Tests/OfficeIMO.AsciiDoc.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.AsciiDoc.Markdown.Tests/OfficeIMO.AsciiDoc.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Latex.Tests/OfficeIMO.Latex.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
            dotnet build OfficeIMO.Latex.Markdown.Tests/OfficeIMO.Latex.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework ${{ matrix.framework }} --no-restore
          fi

      - name: Run tests
        run: |
          # Keep the heavy Excel image visual gate on its dedicated script path; run test projects
          # explicitly so Ubuntu does not spend the job budget walking every solution project.
          test_filter='Category!=ExcelImageVisualGate'
          run_shared_tests() {
            local name="$1"
            local filter="$2"
            local collect_coverage="${3:-false}"
            local coverage_args=()
            # Keep PR test partitions focused on contract proof. Coverage collection is
            # intentionally disabled for the matrix because it turns data-heavy Markdown
            # and PDF slices into long-running hosted-runner jobs.
            if [ "${{ matrix.collectCoverage }}" = "true" ] && [ "${collect_coverage}" = "true" ]; then
              coverage_args=(--collect "XPlat Code Coverage")
            fi
            echo ""
            echo "== OfficeIMO.Shared.Tests: ${name} =="
            dotnet test OfficeIMO.Shared.Tests/OfficeIMO.Shared.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "(${filter})&${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx "${coverage_args[@]}"
          }

          run_excel_tests() {
            local name="$1"
            local filter="$2"
            echo ""
            echo "== OfficeIMO.Excel.Tests: ${name} =="
            dotnet test OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "(${filter})&${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_word_tests() {
            local name="$1"
            local filter="$2"
            echo ""
            echo "== OfficeIMO.Word.Tests: ${name} =="
            dotnet test OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "(${filter})&${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_markdown_tests() {
            local name="$1"
            local filter="$2"
            echo ""
            echo "== OfficeIMO.Markdown.Tests: ${name} =="
            dotnet test OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "(${filter})&${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_powerpoint_tests() {
            echo ""
            echo "== OfficeIMO.PowerPoint.Tests =="
            dotnet test OfficeIMO.PowerPoint.Tests/OfficeIMO.PowerPoint.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_visio_tests() {
            echo ""
            echo "== OfficeIMO.Visio.Tests =="
            dotnet test OfficeIMO.Visio.Tests/OfficeIMO.Visio.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_rtf_tests() {
            echo ""
            echo "== OfficeIMO.Rtf.Tests =="
            dotnet test OfficeIMO.Rtf.Tests/OfficeIMO.Rtf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_html_tests() {
            echo ""
            echo "== OfficeIMO.Html.Tests =="
            dotnet test OfficeIMO.Html.Tests/OfficeIMO.Html.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_reader_tests() {
            echo ""
            echo "== OfficeIMO.Reader.Tests =="
            dotnet test OfficeIMO.Reader.Tests/OfficeIMO.Reader.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_pdf_tests() {
            local name="$1"
            local filter="$2"
            echo ""
            echo "== OfficeIMO.Pdf.Tests: ${name} =="
            dotnet test OfficeIMO.Pdf.Tests/OfficeIMO.Pdf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "(${filter})&${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_drawing_tests() {
            echo ""
            echo "== OfficeIMO.Drawing.Tests =="
            dotnet test OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_googleworkspace_tests() {
            echo ""
            echo "== OfficeIMO.GoogleWorkspace.Tests =="
            dotnet test OfficeIMO.GoogleWorkspace.Tests/OfficeIMO.GoogleWorkspace.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_markup_tests() {
            echo ""
            echo "== OfficeIMO.Markup.Tests =="
            dotnet test OfficeIMO.Markup.Tests/OfficeIMO.Markup.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          run_opendocument_tests() {
            echo ""
            echo "== OfficeIMO.OpenDocument.Tests =="
            dotnet test OfficeIMO.OpenDocument.Tests/OfficeIMO.OpenDocument.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          }

          audit_retired_aggregate_tests() {
            echo ""
            echo "== retired aggregate test project audit =="
            if [ -f OfficeIMO.Tests/OfficeIMO.Tests.csproj ]; then
              echo "OfficeIMO.Tests/OfficeIMO.Tests.csproj must stay retired. Put tests in a domain project or OfficeIMO.Shared.Tests."
              exit 1
            fi
            if find OfficeIMO.Tests -maxdepth 1 -name '*.cs' -print -quit 2>/dev/null | grep -q .; then
              echo "OfficeIMO.Tests still contains root test sources. Move them to a domain test project or OfficeIMO.Shared.Tests."
              exit 1
            fi
          }

          audit_markdown_test_partitions() {
            local list_file
            list_file="$(mktemp)"
            echo ""
            echo "== OfficeIMO.Markdown.Tests: partition coverage audit =="
            dotnet test OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity quiet --framework ${{ matrix.framework }} --list-tests --filter "${test_filter}" > "${list_file}"
            python3 - "${list_file}" <<'PY'
          import sys

          with open(sys.argv[1], encoding="utf-8", errors="replace") as handle:
              discovered = [line.strip() for line in handle if line.startswith("    ") and line.strip()]

          markdown_partitions = (
              "OfficeIMO.Tests.Markdown.",
              "OfficeIMO.Tests.MarkdownSuite",
              "OfficeIMO.Tests.MarkdownHtmlToMarkdownCompatibilityTests",
              "OfficeIMO.Tests.MarkdownHtmlToMarkdownTests",
              "OfficeIMO.Tests.MarkdownHtmlApiContracts",
              "OfficeIMO.Tests.Markdown_",
              "OfficeIMO.Tests.MarkdownTranscript",
              "OfficeIMO.Tests.MarkdownReaderBomTests",
              "OfficeIMO.Tests.MarkdownBlankLinesTests",
              "OfficeIMO.Tests.MarkdownDefinitionLinesTests",
              "OfficeIMO.Tests.MarkdownOrderedListsTests",
              "OfficeIMO.Tests.MarkdownStreamingPreviewTests",
              "OfficeIMO.Tests.Markdown_Renderer",
              "OfficeIMO.Tests.Markdown_IntelligenceX",
          )

          unassigned = [name for name in discovered if not any(partition in name for partition in markdown_partitions)]
          if unassigned:
              print("OfficeIMO.Markdown.Tests partition audit found tests that are not assigned to a named CI slice:")
              for name in unassigned:
                  print(f"  {name}")
              sys.exit(1)

          print(f"OfficeIMO.Markdown.Tests partition audit covered {len(discovered)} discovered tests.")
          PY
            rm -f "${list_file}"
          }

          if [ "${{ matrix.framework }}" = "net8.0" ] && [ "${{ matrix.partition }}" = "markdown-large" ]; then
            audit_markdown_test_partitions
          fi

          case "${{ matrix.partition }}" in
            markdown-large)
              run_word_tests "word-markdown-roundtrip" 'FullyQualifiedName~OfficeIMO.Tests.MarkdownMoreCasesTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownRoundTripTests'
              run_markdown_tests "markdown-root" 'FullyQualifiedName~OfficeIMO.Tests.Markdown.'
              ;;
            markdown-suite)
              run_markdown_tests "markdown-suite" 'FullyQualifiedName~OfficeIMO.Tests.MarkdownSuite'
              run_markdown_tests "markdown-named" 'FullyQualifiedName~OfficeIMO.Tests.MarkdownHtmlToMarkdownCompatibilityTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownHtmlToMarkdownTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownHtmlApiContracts|FullyQualifiedName~OfficeIMO.Tests.Markdown_|FullyQualifiedName~OfficeIMO.Tests.MarkdownTranscript|FullyQualifiedName~OfficeIMO.Tests.MarkdownReaderBomTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownBlankLinesTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownDefinitionLinesTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownOrderedListsTests|FullyQualifiedName~OfficeIMO.Tests.MarkdownStreamingPreviewTests|FullyQualifiedName~OfficeIMO.Tests.Markdown_Renderer|FullyQualifiedName~OfficeIMO.Tests.Markdown_IntelligenceX'
              ;;
            pdf-visual-inspector)
              run_pdf_tests "pdf-visual-inspector" 'FullyQualifiedName~OfficeIMO.Tests.Pdf.PdfDocumentVisualQualityTests|FullyQualifiedName~OfficeIMO.Tests.Pdf.PdfInspectorTests|FullyQualifiedName~OfficeIMO.Tests.Pdf.PdfReaderAndFooterRegressionTests|FullyQualifiedName~OfficeIMO.Tests.Pdf.MarkdownSaveAsPdfVisualTests|FullyQualifiedName~OfficeIMO.Tests.Pdf.PdfDocumentRasterVisualBaselineTests'
              ;;
            pdf-core)
              run_pdf_tests "pdf-core" '(FullyQualifiedName~OfficeIMO.Tests.Pdf.&FullyQualifiedName!~OfficeIMO.Tests.Pdf.PdfDocumentVisualQualityTests&FullyQualifiedName!~OfficeIMO.Tests.Pdf.PdfInspectorTests&FullyQualifiedName!~OfficeIMO.Tests.Pdf.PdfReaderAndFooterRegressionTests&FullyQualifiedName!~OfficeIMO.Tests.Pdf.MarkdownSaveAsPdfVisualTests&FullyQualifiedName!~OfficeIMO.Tests.Pdf.PdfDocumentRasterVisualBaselineTests)|FullyQualifiedName~OfficeIMO.Tests.MarkdownPdfTests|FullyQualifiedName~OfficeIMO.Tests.PdfReadLayoutSmokeTests'
              ;;
            excel-image-charts)
              run_excel_tests "excel-image" 'FullyQualifiedName~OfficeIMO.Tests.ExcelImageExport'
              run_excel_tests "excel-charts" 'FullyQualifiedName~OfficeIMO.Tests.Excel.Test_ExcelChart|FullyQualifiedName~OfficeIMO.Tests.Excel.SharedChartRenderer'
              run_excel_tests "excel-closedxml-gap" 'FullyQualifiedName~OfficeIMO.Tests.Excel.Test_ClosedXmlGap'
              ;;
            excel-legacy-reader)
              run_excel_tests "excel-legacy-xls" 'FullyQualifiedName~OfficeIMO.Tests.Excel.LegacyXls'
              run_excel_tests "excel-performance" 'FullyQualifiedName~OfficeIMO.Tests.Excel.PerformanceReview'
              run_excel_tests "excel-reader" 'FullyQualifiedName~OfficeIMO.Tests.Excel.Reader|FullyQualifiedName~OfficeIMO.Tests.Excel.ReadRows|FullyQualifiedName~OfficeIMO.Tests.Excel.ExcelHttp'
              run_excel_tests "excel-save-pdf" 'FullyQualifiedName~OfficeIMO.Tests.Excel.SaveAsPdf|FullyQualifiedName~OfficeIMO.Tests.Excel.ToPdfDocument|FullyQualifiedName~OfficeIMO.Tests.Excel.PdfTables|FullyQualifiedName~OfficeIMO.Tests.Excel.ReportWorkflow'
              ;;
            excel-core-named)
              run_excel_tests "excel-named-typed" 'FullyQualifiedName~OfficeIMO.Tests.ExcelCellAndRangeTests|FullyQualifiedName~OfficeIMO.Tests.ExcelDelimitedImportTests|FullyQualifiedName~OfficeIMO.Tests.ExcelFluent|FullyQualifiedName~OfficeIMO.Tests.ExcelInfoBuilderTests|FullyQualifiedName~OfficeIMO.Tests.ExcelNamed|FullyQualifiedName~OfficeIMO.Tests.ExcelPowerShell|FullyQualifiedName~OfficeIMO.Tests.ExcelRange|FullyQualifiedName~OfficeIMO.Tests.ExcelRows|FullyQualifiedName~OfficeIMO.Tests.ExcelSheet|FullyQualifiedName~OfficeIMO.Tests.ExcelCoerce'
              run_excel_tests "excel-core" '(FullyQualifiedName~OfficeIMO.Tests.Excel.&FullyQualifiedName!~OfficeIMO.Tests.Excel.Test_ExcelChart&FullyQualifiedName!~OfficeIMO.Tests.Excel.SharedChartRenderer&FullyQualifiedName!~OfficeIMO.Tests.Excel.Test_ClosedXmlGap&FullyQualifiedName!~OfficeIMO.Tests.Excel.LegacyXls&FullyQualifiedName!~OfficeIMO.Tests.Excel.PerformanceReview&FullyQualifiedName!~OfficeIMO.Tests.Excel.SaveAsPdf&FullyQualifiedName!~OfficeIMO.Tests.Excel.ToPdfDocument&FullyQualifiedName!~OfficeIMO.Tests.Excel.PdfTables&FullyQualifiedName!~OfficeIMO.Tests.Excel.ReportWorkflow&FullyQualifiedName!~OfficeIMO.Tests.Excel.Reader&FullyQualifiedName!~OfficeIMO.Tests.Excel.ReadRows&FullyQualifiedName!~OfficeIMO.Tests.Excel.ExcelHttp)'
              ;;
            word-rtf-html)
              run_word_tests "word" 'FullyQualifiedName~OfficeIMO.Tests.Word|FullyQualifiedName~OfficeIMO.Tests.ImageEmbedderTests|FullyQualifiedName~OfficeIMO.Tests.ParagraphParentMutationTests'
              run_rtf_tests
              run_html_tests
              ;;
            other-projects)
              audit_retired_aggregate_tests
              run_drawing_tests
              dotnet test OfficeIMO.Drawing.CodeGlyphX.Tests/OfficeIMO.Drawing.CodeGlyphX.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              run_googleworkspace_tests
              run_markup_tests
              run_opendocument_tests
              dotnet test OfficeIMO.OpenDocument.Converters.Tests/OfficeIMO.OpenDocument.Converters.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "${test_filter}" -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              run_powerpoint_tests
              run_visio_tests
              run_reader_tests
              dotnet test OfficeIMO.OneNote.Tests/OfficeIMO.OneNote.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} -m:1 --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              run_shared_tests "shared-contracts" 'FullyQualifiedName~OfficeIMO.Shared.Tests.'
              dotnet test OfficeIMO.CSV.Tests/OfficeIMO.CSV.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.VerifyTests/OfficeIMO.VerifyTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.MarkdownRenderer.Wpf.Tests/OfficeIMO.MarkdownRenderer.Wpf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.AsciiDoc.Tests/OfficeIMO.AsciiDoc.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.AsciiDoc.Markdown.Tests/OfficeIMO.AsciiDoc.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.Latex.Tests/OfficeIMO.Latex.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              dotnet test OfficeIMO.Latex.Markdown.Tests/OfficeIMO.Latex.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              ;;
            *)
              echo "Unknown partition: ${{ matrix.partition }}"
              exit 1
              ;;
          esac

      - name: Summarize failing tests
        if: failure() && env.SUMMARIZE_FAILURES == 'true'
        shell: pwsh
        run: |
          $trxFiles = Get-ChildItem -Recurse -Filter *.trx
          if ($trxFiles.Count -eq 0) {
            Write-Host "No TRX files found for failure analysis"
            exit 0
          }

          Write-Host "=== Failed Tests Summary ==="
          $failureCount = 0

          foreach ($file in $trxFiles) {
            try {
              Select-Xml -Path $file.FullName -XPath "//UnitTestResult[@outcome='Failed']" |
                ForEach-Object {
                  $name = $_.Node.testName
                  $msg = $_.Node.Output.ErrorInfo.Message ?? "No error message available"
                  Write-Host "❌ $name"
                  Write-Host "   $msg"
                  $failureCount++
                }
            } catch {
              Write-Host "Warning: Could not parse TRX file $($file.Name): $($_.Exception.Message)"
            }
          }

          if ($failureCount -eq 0) {
            Write-Host "No failed tests found in TRX files"
          } else {
            Write-Host "=== Total failed tests: $failureCount ==="
          }

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-ubuntu-${{ matrix.framework }}-${{ matrix.partition }}
          path: '**/*.trx'
      - name: Upload coverage to Codecov
        if: ${{ matrix.collectCoverage }}
        uses: codecov/codecov-action@v5
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
        continue-on-error: true

  excel-image-visual-gate:
    name: 'Excel image visual smoke gate'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore test dependencies
        run: |
          dotnet restore OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj
          dotnet restore OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj

      - name: Build test project
        run: |
          dotnet build OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore
          dotnet build OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore

      - name: Run Excel image visual gate
        shell: pwsh
        run: ./Build/Test-ExcelImageVisualGate.ps1 -Configuration ${{ env.BUILD_CONFIGURATION }} -Framework net8.0 -Suite Smoke -NoRestore -NoBuild

  office-interoperability-gate:
    name: 'Word and Excel interoperability gate'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore interoperability test dependencies
        run: |
          dotnet restore OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj
          dotnet restore OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj
          dotnet restore OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj

      - name: Build interoperability test projects
        run: |
          dotnet build OfficeIMO.Drawing.Tests/OfficeIMO.Drawing.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore
          dotnet build OfficeIMO.Excel.Tests/OfficeIMO.Excel.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore
          dotnet build OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net8.0 --no-restore

      - name: Run Word and Excel interoperability gate
        shell: pwsh
        run: ./Build/Test-OfficeInteroperabilityGate.ps1 -Configuration ${{ env.BUILD_CONFIGURATION }} -Framework net8.0 -Suite Full -NoRestore -NoBuild

  test-ubuntu:
    name: 'Ubuntu'
    runs-on: ubuntu-latest
    needs:
      - test-ubuntu-matrix
      - excel-image-visual-gate
      - office-interoperability-gate
      - binary-powerpoint-libreoffice
    if: always()
    steps:
      - name: Check Ubuntu test matrix
        run: |
          if [ "${{ needs.test-ubuntu-matrix.result }}" != "success" ]; then
            echo "Ubuntu test matrix result: ${{ needs.test-ubuntu-matrix.result }}"
            exit 1
          fi
          if [ "${{ needs.excel-image-visual-gate.result }}" != "success" ]; then
            echo "Excel image visual gate result: ${{ needs.excel-image-visual-gate.result }}"
            exit 1
          fi
          if [ "${{ needs.office-interoperability-gate.result }}" != "success" ]; then
            echo "Word and Excel interoperability gate result: ${{ needs.office-interoperability-gate.result }}"
            exit 1
          fi
          if [ "${{ needs.binary-powerpoint-libreoffice.result }}" != "success" ]; then
            echo "Binary PowerPoint LibreOffice gate result: ${{ needs.binary-powerpoint-libreoffice.result }}"
            exit 1
          fi
          echo "Ubuntu test matrix passed."

  test-macos-matrix:
    name: 'macOS platform smoke'
    runs-on: macos-latest
    # Linux covers the full net8.0/net10.0 solution test contract. Hosted macOS
    # runners are scarce for the organization, so keep this lane to one focused
    # platform smoke that proves macOS restore/build/test execution still works.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: net8.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore OfficeIMO.sln

      - name: Build solution
        run: dotnet build OfficeIMO.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run tests
        run: |
          dotnet test OfficeIMO.Word.Tests/OfficeIMO.Word.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName=OfficeIMO.Tests.Word.Test_WordDocument_SaveAsPdf" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          dotnet test OfficeIMO.Html.Tests/OfficeIMO.Html.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName~OfficeIMO.Tests.HtmlCoreTests" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          dotnet test OfficeIMO.Pdf.Tests/OfficeIMO.Pdf.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName~OfficeIMO.Tests.Pdf.PdfReadStreamTests" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          dotnet test OfficeIMO.Markdown.Tests/OfficeIMO.Markdown.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName~OfficeIMO.Tests.Markdown.Test_SaveAsMarkdown_FileAndRead" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          dotnet test OfficeIMO.CSV.Tests/OfficeIMO.CSV.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName~OfficeIMO.CSV.Tests" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
          dotnet test OfficeIMO.VerifyTests/OfficeIMO.VerifyTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity ${{ env.TEST_VERBOSITY }} --framework ${{ matrix.framework }} --filter "FullyQualifiedName~OfficeIMO.VerifyTests" --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx

      - name: Summarize failing tests
        if: failure() && env.SUMMARIZE_FAILURES == 'true'
        shell: pwsh
        run: |
          $trxFiles = Get-ChildItem -Recurse -Filter *.trx
          if ($trxFiles.Count -eq 0) {
            Write-Host "No TRX files found for failure analysis"
            exit 0
          }

          Write-Host "=== Failed Tests Summary ==="
          $failureCount = 0

          foreach ($file in $trxFiles) {
            try {
              Select-Xml -Path $file.FullName -XPath "//UnitTestResult[@outcome='Failed']" |
                ForEach-Object {
                  $name = $_.Node.testName
                  $msg = $_.Node.Output.ErrorInfo.Message ?? "No error message available"
                  Write-Host "❌ $name"
                  Write-Host "   $msg"
                  $failureCount++
                }
            } catch {
              Write-Host "Warning: Could not parse TRX file $($file.Name): $($_.Exception.Message)"
            }
          }

          if ($failureCount -eq 0) {
            Write-Host "No failed tests found in TRX files"
          } else {
            Write-Host "=== Total failed tests: $failureCount ==="
          }

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-macos-${{ matrix.framework }}
          path: '**/*.trx'

  test-macos:
    name: 'macOS'
    runs-on: ubuntu-latest
    needs: test-macos-matrix
    if: always()
    steps:
      - name: Check macOS test matrix
        run: |
          if [ "${{ needs.test-macos-matrix.result }}" != "success" ]; then
            echo "macOS test matrix result: ${{ needs.test-macos-matrix.result }}"
            exit 1
          fi
          echo "macOS test matrix passed."

  aot-trim-analyzers:
    name: 'AOT/Trim analyzers'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore OfficeIMO.sln

      - name: Restore HTML NativeAOT smoke
        run: dotnet restore OfficeIMO.Html.AotSmoke/OfficeIMO.Html.AotSmoke.csproj --runtime linux-x64

      - name: Run AOT/Trim analyzers (net8.0)
        run: dotnet build OfficeIMO.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -p:EnableTrimAnalyzer=true -p:EnableAotAnalyzer=true -p:TargetFramework=net8.0

      - name: Run AOT/Trim analyzers (net10.0)
        run: dotnet build OfficeIMO.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -p:EnableTrimAnalyzer=true -p:EnableAotAnalyzer=true -p:TargetFramework=net10.0

      - name: Publish HTML/PDF/image NativeAOT smoke
        run: dotnet publish OfficeIMO.Html.AotSmoke/OfficeIMO.Html.AotSmoke.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --runtime linux-x64 --no-restore --output artifacts/html-aot-smoke

      - name: Run HTML/PDF/image NativeAOT smoke
        run: ./artifacts/html-aot-smoke/OfficeIMO.Html.AotSmoke
