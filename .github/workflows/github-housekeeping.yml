name: GitHub Housekeeping

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply deletions (true/false)'
        required: false
        default: 'true'

permissions:
  actions: write
  contents: read

concurrency:
  group: github-housekeeping-${{ github.repository }}
  cancel-in-progress: false

jobs:
  housekeeping:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-github-housekeeping.yml@62a72786d9c2acc02f843643b624b0b86a731cba
    with:
      config-path: ./.powerforge/github-housekeeping.json
      apply: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == 'true' || github.event_name != 'workflow_dispatch' }}
      powerforge-ref: 62a72786d9c2acc02f843643b624b0b86a731cba
      report-artifact-name: github-housekeeping-reports
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
