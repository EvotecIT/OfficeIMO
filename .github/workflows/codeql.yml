name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '*.md'
      - 'Docs/**'
      - 'Examples/**'
      - '.gitignore'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '*.md'
      - 'Docs/**'
      - 'Examples/**'
      - '.gitignore'
  schedule:
    - cron: '23 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        if: matrix.build-mode == 'manual'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.418
            10.0.103

      - name: Cache NuGet packages
        if: matrix.build-mode == 'manual'
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Restore and Build
        if: matrix.build-mode == 'manual'
        run: |
          $projects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object {
            $_.FullName -notmatch '\\(OfficeIMO\.Examples|OfficeIMO\.Tests|OfficeIMO\.CSV\.Tests|OfficeIMO\.VerifyTests|OfficeIMO\.Markdown\.Benchmarks|OfficeIMO\.Excel\.Benchmarks|OfficeIMO\.MarkdownRenderer\.Wpf\.Tests)\\'
          } | Sort-Object FullName

          dotnet restore OfficeIMO.sln
          foreach ($project in $projects) {
            dotnet build $project.FullName --configuration Release --no-restore
          }

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
