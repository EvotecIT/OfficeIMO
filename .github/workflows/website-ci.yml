name: Website Build (PR)

on:
  pull_request:
    paths:
      - "Website/**"
      - ".github/workflows/website-ci.yml"
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@a712d6d7a353719499b3727dbcfb3a151da1c296
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: a712d6d7a353719499b3727dbcfb3a151da1c296
      report_artifact_name: powerforge-website-reports
