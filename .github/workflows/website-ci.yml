name: Website Build (PR)

on:
  pull_request:
    paths:
      - 'Website/**'
      - '.github/workflows/website-ci.yml'
      - '.github/workflows/deploy-website.yml'
      - '.github/workflows/website-maintenance.yml'
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@e03dfef1b91cc7f58dfb87f3b4dc6b3dac32744a
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      runner_labels_json: ${{ (github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_web_tag: PowerForgeWeb-v1.0.0-preview-20260328151156
      report_artifact_name: powerforge-website-reports
    secrets:
      indexnow_key: ${{ secrets.INDEXNOW_KEY }}
