name: Website Maintenance

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: website-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  website-maintenance:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-maintenance.yml@feaee913e8c88cda888db3e2dbca320c1c472f6c
    with:
      website_root: Website
      pipeline_config: Website/pipeline.maintenance.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: feaee913e8c88cda888db3e2dbca320c1c472f6c
      report_artifact_name: powerforge-website-maintenance-reports
