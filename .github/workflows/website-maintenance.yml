name: Website Maintenance

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: website-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  website-maintenance:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-maintenance.yml@9cdc20a49acb8492c6f81cd6863c393837b1a477
    with:
      website_root: Website
      pipeline_config: Website/pipeline.maintenance.json
      runner_labels_json: ${{ (github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_web_tag: PowerForgeWeb-v1.0.0-preview-20260328151156
      report_artifact_name: powerforge-website-maintenance-reports
