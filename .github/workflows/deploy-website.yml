name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'Website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  POWERFORGE_REPOSITORY: EvotecIT/PSPublishModule
  POWERFORGE_REF: 6db1d9506ccdce5ab063d979e654fdd4f8645b21
  PSWRITEOFFICE_REPOSITORY: EvotecIT/PSWriteOffice

jobs:
  build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout PSPublishModule
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.POWERFORGE_REPOSITORY }}
          ref: ${{ env.POWERFORGE_REF }}
          path: PSPublishModule

      - name: Checkout PSWriteOffice
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.PSWRITEOFFICE_REPOSITORY }}
          token: ${{ secrets.READ_ALL || github.token }}
          path: PSWriteOffice

      - name: Restore and build PowerForge.Web.Cli
        run: |
          dotnet restore PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj --force-evaluate
          dotnet build PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -c Release --no-restore

      - name: Sync PSWriteOffice API docs
        shell: pwsh
        run: ./Website/scripts/Sync-PSWriteOfficeApiDocs.ps1 -PSWriteOfficeRoot ./PSWriteOffice

      - name: Build website
        working-directory: Website
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: dotnet ../PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll pipeline --config pipeline.json --mode ci

      - name: Verify website output
        run: |
          test -f Website/_site/.nojekyll
          test -f Website/_site/CNAME
          test -f Website/_site/index.html
          test -f Website/_site/docs/index.html
          test -f Website/_site/blog/index.html
          test -f Website/_site/api/index.html
          test -f Website/_site/api/powerpoint/index.html
          test -f Website/_site/api/csv/index.html
          test -f Website/_site/api/visio/index.html
          test -f Website/_site/api/reader/index.html
          test -f Website/_site/404.html
          grep -Eqi "<link[^>]+rel=[^>]*stylesheet" Website/_site/404.html

      - name: Archive Pages artifact
        shell: bash
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "Website/_site" \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Prune stale github-pages artifacts
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const keepNewest = 3;
            const minAgeHours = 6;
            const now = Date.now();
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, name: "github-pages", per_page: 100 },
              (response) => response?.data?.artifacts ?? []
            );

            artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let deleted = 0;
            let skippedRecent = 0;
            let failures = 0;

            for (const artifact of artifacts.slice(keepNewest)) {
              const created = new Date(artifact.created_at).getTime();
              const ageHours = Number.isFinite(created) ? (now - created) / (1000 * 60 * 60) : minAgeHours + 1;
              if (ageHours < minAgeHours) {
                skippedRecent++;
                continue;
              }

              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                deleted++;
                core.info(`Deleted artifact id=${artifact.id} created_at=${artifact.created_at}`);
              } catch (error) {
                failures++;
                core.warning(`Failed to delete artifact id=${artifact.id}: ${error.message}`);
              }
            }

            core.info(
              `Artifact prune summary: found=${artifacts.length}, kept=${Math.min(artifacts.length, keepNewest)}, deleted=${deleted}, skipped_recent=${skippedRecent}, failures=${failures}`
            );

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ${{ fromJSON((github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  purge-cloudflare:
    needs: deploy
    runs-on: ${{ fromJSON((github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    permissions:
      contents: read
    steps:
      - name: Resolve Cloudflare settings
        id: cloudflare
        run: |
          token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          zone="${{ secrets.CLOUDFLARE_ZONE_ID_OFFICEIMO }}"
          if [ -z "$token" ] || [ -z "$zone" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare purge/verify skipped: missing required secrets."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout PSPublishModule
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.POWERFORGE_REPOSITORY }}
          ref: ${{ env.POWERFORGE_REF }}
          path: PSPublishModule

      - name: Restore and build PowerForge.Web.Cli
        if: steps.cloudflare.outputs.enabled == 'true'
        run: |
          dotnet restore PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj --force-evaluate
          dotnet build PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -c Release --no-restore

      - name: Purge Cloudflare cache (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          dotnet PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll \
            cloudflare purge \
            --zone-id "${{ secrets.CLOUDFLARE_ZONE_ID_OFFICEIMO }}" \
            --token-env CLOUDFLARE_API_TOKEN \
            --site-config "Website/site.json"

      - name: Verify Cloudflare cache status (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        run: |
          dotnet PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll \
            cloudflare verify \
            --site-config "Website/site.json" \
            --warmup 1 \
            --allow-status "HIT,REVALIDATED,EXPIRED,STALE,DYNAMIC"
