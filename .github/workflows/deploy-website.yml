name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - "Website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  resolve-post-deploy:
    runs-on: ubuntu-latest
    outputs:
      post_deploy_pipeline_config: ${{ steps.cloudflare.outputs.post_deploy_pipeline_config }}
    steps:
      - name: Resolve optional post-deploy pipeline
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID_OFFICEIMO: ${{ secrets.CLOUDFLARE_ZONE_ID_OFFICEIMO }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_ZONE_ID_OFFICEIMO:-}" ]; then
            echo "post_deploy_pipeline_config=Website/pipeline.cloudflare.json" >> "$GITHUB_OUTPUT"
          else
            echo "post_deploy_pipeline_config=" >> "$GITHUB_OUTPUT"
          fi

  website-deploy:
    needs: resolve-post-deploy
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-deploy.yml@7ebebd771b3e99fd590babfd1c905b21df89243e
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      site_output_path: Website/_site
      post_deploy_pipeline_config: ${{ needs.resolve-post-deploy.outputs.post_deploy_pipeline_config }}
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.OFFICEIMO_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 7ebebd771b3e99fd590babfd1c905b21df89243e
    secrets:
      indexnow_key: ${{ secrets.INDEXNOW_KEY }}
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID_OFFICEIMO }}
